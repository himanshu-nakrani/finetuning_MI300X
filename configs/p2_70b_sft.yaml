# P2 — Qwen2.5-72B LoRA SFT on curated base mix (Day 1, ~6.0 GPU-hr)
# Headline Day-1 deliverable. Tulu-3 mix, deduped + decontaminated to 20k.
# Ships HF repo #2 (adapter + optionally merged bf16 shards).
#
# Model: Qwen/Qwen2.5-72B-Instruct (Sep 2024)
#   - Non-gated (Llama-3.3 was gated, Llama-3.1 we have but is older)
#   - 72B dense → ~144 GB bf16 weights + ~30-40 GB activations/optim with LoRA
#     fits on a single MI300X (192 GB)
#   - Stronger than Llama-3.1-70B on MMLU, MATH, GSM8K, HumanEval
#   - Different chat template (ChatML), but tokenizer.apply_chat_template
#     handles it transparently — no script changes required
#
# Other non-gated 70B-class options (one-line swap):
#   - swiss-ai/Apertus-70B-Instruct-2509        (Apache 2.0, fully open data lineage)
#   - Qwen/Qwen3-32B                            (32B Apache 2.0, ~3 GPU-hr instead of 6)
#   - mistralai/Mistral-Small-24B-Instruct-2501 (24B Apache 2.0, very fast)

run_name: qwen2.5-72b-instruct-mix-sft
seed: 42

model:
  name: Qwen/Qwen2.5-72B-Instruct
  max_seq_length: 4096
  load_in_4bit: false      # LoRA on bf16 (not QLoRA) — MI300X has the VRAM
  dtype: bfloat16

# Pre-built locally by data/prepare_base_mix.py:
data:
  jsonl_path: /scratch/finetune/data/base_mix_20k.jsonl   # one {"messages": [...]} per line
  shuffle_seed: 42

lora:
  r: 32
  alpha: 64
  dropout: 0.0          # Unsloth's fast LoRA path requires 0; >0 disables it
  bias: none
  # Unsloth wants an explicit list, not the PEFT "all-linear" shortcut.
  # Same module names for Llama-3.x and Qwen2.5/3 dense.
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_gradient_checkpointing: unsloth

train:
  output_dir: /scratch/finetune/outputs/p2_70b_sft
  num_train_epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 16          # effective bs = 64
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  optim: adamw_8bit
  bf16: true
  logging_steps: 5
  save_strategy: steps
  save_steps: 100                          # ~every 30 min at this throughput
  save_total_limit: 3
  report_to: wandb
  # Hard wall-clock guard so an overrun can't eat Day 2's budget:
  max_runtime_minutes: 360                 # 6.0 hr cap

hub:
  push: true
  repo_id: null            # --hub_repo_id <user>/llama-3.1-70b-instruct-mix-sft
  private: false
  push_merged: false       # adapter only by default — merge in Day 5 quantize step
