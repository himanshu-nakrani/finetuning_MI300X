# P3 — Reasoning SFT on public curated mix (Project A, ~4.0 GPU-hr)
# Continues P2's LoRA adapter on a 10k reasoning mix built by
# data/prepare_reasoning_mix.py (OpenMathInstruct-2 + CodeFeedback +
# optional self-generated seeds from the prior vLLM attempt).

run_name: qwen2.5-72b-reasoning-sft
seed: 42

model:
  name: Qwen/Qwen2.5-72B-Instruct
  max_seq_length: 2048                 # reasoning examples are typically <1500 toks
  load_in_4bit: false
  dtype: bfloat16
  resume_adapter: /scratch/finetune/outputs/p2_70b_sft/adapter

data:
  jsonl_path: /scratch/finetune/data/reasoning_mix_10k.jsonl
  shuffle_seed: 42

# Used only if resume_adapter is null. Same shape as P2.
lora:
  r: 32
  alpha: 64
  dropout: 0.0
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  use_gradient_checkpointing: unsloth

train:
  output_dir: /scratch/finetune/outputs/p3_reasoning_sft
  num_train_epochs: 2
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 8           # effective bs = 32
  learning_rate: 1.0e-4                    # half of P2's LR — continuation training
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  optim: adamw_8bit
  bf16: true
  logging_steps: 5
  save_strategy: steps
  save_steps: 50
  save_total_limit: 3
  report_to: wandb
  max_runtime_minutes: 240                 # 4.0 hr cap (was 6.5 in the old plan)

hub:
  push: true
  repo_id: null            # --hub_repo_id <user>/qwen2.5-72b-reasoning-sft
  private: false
  push_merged: false
