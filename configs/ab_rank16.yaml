# Project B, ablation A: Llama-3.1-8B QLoRA rank=16 on the reasoning mix.

run_name: llama-3.1-8b-reasoning-qlora-r16
seed: 42

model:
  name: meta-llama/Meta-Llama-3.1-8B-Instruct
  max_seq_length: 2048
  load_in_4bit: true      # QLoRA
  dtype: null

data:
  jsonl_path: /scratch/finetune/data/reasoning_mix_10k.jsonl
  shuffle_seed: 42

mode: lora
lora:
  r: 16
  alpha: 32
  dropout: 0.0
  bias: none
  target_modules: [q_proj, k_proj, v_proj, o_proj, gate_proj, up_proj, down_proj]
  use_gradient_checkpointing: unsloth

train:
  output_dir: /scratch/finetune/outputs/ab_rank16
  num_train_epochs: 3
  per_device_train_batch_size: 8
  gradient_accumulation_steps: 2           # effective bs = 16
  learning_rate: 2.0e-4
  lr_scheduler_type: cosine
  warmup_ratio: 0.03
  weight_decay: 0.0
  optim: adamw_8bit
  bf16: true
  logging_steps: 10
  save_strategy: steps
  save_steps: 200
  save_total_limit: 2
  report_to: wandb
  max_runtime_minutes: 100                 # 1.5 hr cap → Project B budget

hub:
  push: true
  repo_id: null            # --hub_repo_id <user>/llama-3.1-8b-reasoning-qlora-r16
  private: false
